[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "hieroforge-core/=../hieroforge-core/src/",
    "hedera-forking/=../hieroforge-core/lib/hedera-forking/contracts/"
]
allow_paths = ["../hieroforge-core/src", "../hieroforge-core/lib", "src", "lib"]

evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
ffi = true
extra_output_files = ["metadata"]

[rpc_endpoints]
local = "http://localhost:7546"
testnet = "https://testnet.hashio.io/api"
mainnet = "https://mainnet.hashio.io/api"
previewnet = "https://previewnet.hashio.io/api"

# Hedera: use --rpc-url $HEDERA_RPC_URL when running scripts (testnet or local node)
# For fork tests: forge test --fork-url https://testnet.hashio.io/api

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
