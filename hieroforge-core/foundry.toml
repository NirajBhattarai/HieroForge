[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "cancun"
# Avoid "stack too deep" in complex functions (e.g. swap)
via_ir = true
optimizer = true
optimizer_runs = 200
# Required for HTS token tests (hedera-forking emulation at 0x167). Enables forge test without --ffi.
ffi = true
# Emit .metadata.json per contract for manual verification at https://verify.hashscan.io
extra_output_files = ["metadata"]

[rpc_endpoints]
local = "http://localhost:7546"
testnet = "https://testnet.hashio.io/api"
mainnet = "https://mainnet.hashio.io/api"
previewnet = "https://previewnet.hashio.io/api"